<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Iris Flower Prediction</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: 'Segoe UI', sans-serif;
}

/* Fullscreen background slider */
.slider{
    position:fixed;
    top:0;
    left:0;
    width:400%;
    height:100%;
    display:flex;
    animation: slide 25s infinite linear;
    z-index:-1;
}

.slider img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* Sliding animation right → left */
@keyframes slide{
    0%   { transform: translateX(0%); }
    25%  { transform: translateX(-25%); }
    50%  { transform: translateX(-50%); }
    75%  { transform: translateX(-75%); }
    100% { transform: translateX(0%); }
}

/* Centered prediction card */
.container{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%, -50%);
    width:380px;
    background:rgba(255,255,255,0.92);
    padding:30px;
    border-radius:18px;
    text-align:center;
    box-shadow:0 10px 35px rgba(0,0,0,0.4);
    backdrop-filter: blur(8px);
}

h1{
    color:#1b5e20;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:14px;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    background:linear-gradient(45deg,#4CAF50,#2E7D32);
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
    font-size:16px;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

#result{
    margin-top:15px;
    font-weight:bold;
    font-size:17px;
    color:#333;
}

.footer{
    margin-top:20px;
    font-size:13px;
    color:#444;
}
</style>
</head>

<body>

<!-- Sliding Background Images -->
<div class="slider">
    <img src="https://images.unsplash.com/photo-1490750967868-88aa4486c946">
    <img src="https://images.unsplash.com/photo-1468327768560-75b778cbb551">
    <img src="https://images.unsplash.com/photo-1501004318641-b39e6451bec6">
    <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e">
</div>

<!-- Prediction Card -->
<div class="container">
    <h1>Iris Flower Prediction</h1>

    <form id="form">
        <input type="number" step="any" id="sl" placeholder="Sepal Length" required>
        <input type="number" step="any" id="sw" placeholder="Sepal Width" required>
        <input type="number" step="any" id="pl" placeholder="Petal Length" required>
        <input type="number" step="any" id="pw" placeholder="Petal Width" required>

        <button type="submit">Predict</button>
    </form>

    <div id="result"></div>

    <div class="footer">
        Project done by <b>GAINABOINA MADHU</b>
    </div>
</div>

<script>
document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();

    fetch("/predict", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            sepal_length: document.getElementById("sl").value,
            sepal_width: document.getElementById("sw").value,
            petal_length: document.getElementById("pl").value,
            petal_width: document.getElementById("pw").value
        })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("result").innerText =
            "Prediction: " + data.prediction;
    })
    .catch(err => {
        document.getElementById("result").innerText =
            "Error connecting to backend!";
        console.error(err);
    });
});
</script>

</body>
</html>
